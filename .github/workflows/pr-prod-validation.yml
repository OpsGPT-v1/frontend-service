name: Production PR Validation

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  ci:
    uses: OpsGPT-v1/shared-workflow/.github/workflows/frontend-ci.yml@main
    with:
      service_name: 'frontend-service'
      node_version: '20'
      working_directory: '.'
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
